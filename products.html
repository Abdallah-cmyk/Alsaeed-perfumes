    {id:5, category:"incense", title:"أميرة غرامي", desc:"أعواد بخور فاخرة برأس خشبي بروائح شرقية غنية.", price:180, img:"https://i.postimg.cc/0y2dw1xb/Vegas-Backflow-Incense-Cones-1-(1).jpg"},

    {id:20, category:"perfumes", title:"Bleu de Chanel", desc:"بلو دي شانيل - عطر فرنسي أصلي.", price:1250, img:"https://i.postimg.cc/sMWZscWT/aswan.jpg"},

    {id:50, category:"incenseers", title:"المبخرة الذكية", desc:"مبخرة زجاجية بتقنية التدفق العكسي للدخان.", price:1500, img:"https://i.postimg.cc/MpKbQJxs/khnjr-ʿmany.png"}
];

// === عرض المنتجات ===
function showSection(category){
    const container = document.getElementById("products-container");
    if(!container) return;
    container.innerHTML="";
    const filtered = products.filter(p=>p.category===category);
    filtered.forEach(p=>{
        const card=document.createElement("div");
        card.className="product-card";
        card.innerHTML=`
            <div class="product-image"><img src="${p.img}" alt="${p.title}" width="250"></div>
            <h3 class="product-title">${p.title}</h3>
            <p class="product-desc">${p.desc}</p>
            <div class="product-price"><span>جنيه</span> ${p.price}</div>
            <a class="btn" href="https://wa.me/01055880061?text=أريد طلب ${p.title}" target="_blank">اطلب عبر واتساب</a>
        `;
        container.appendChild(card);
    });
}
</script>

</body>
</html>
